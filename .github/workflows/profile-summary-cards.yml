name: Generate Profile Summary Cards

on:
  schedule:
    # Runs every day at 03:00 UTC (midnight in Brazil)
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - claude/linkedin-profile-readme-h4e1kh # temp: verify run before merge

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Generate summary cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: main
          UTC_OFFSET: -3
